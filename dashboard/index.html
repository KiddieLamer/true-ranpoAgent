<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>true-ranpoAgent — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'JetBrains Mono', monospace; }
    body { background: #0a0a0f; color: #e0e0e0; }
    .card { background: #12121a; border: 1px solid #1e1e2e; border-radius: 12px; transition: all 0.2s; }
    .card:hover { border-color: #3b82f6; }
    .agent-tag { font-size: 10px; padding: 2px 8px; border-radius: 999px; }
    .progress-bar { height: 6px; border-radius: 999px; background: #1e1e2e; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.15); }
  </style>
</head>
<body>
  <div x-data="app()" class="p-6 max-w-7xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl font-bold text-white">true-ranpoAgent</h1>
        <p class="text-gray-400 text-sm mt-1">AI Scrum Team Dashboard</p>
      </div>
      <div class="flex gap-3">
        <a href="/sprint.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition">Sprint Board</a>
        <a href="/docs.html" class="px-4 py-2 bg-gray-800 text-gray-300 rounded-lg text-sm hover:bg-gray-700 transition">Documents</a>
      </div>
    </div>

    <!-- Ceremonies Timeline -->
    <div class="card p-4 mb-6 glow">
      <h2 class="text-sm font-semibold text-gray-300 uppercase tracking-wider mb-3">Sprint Ceremonies</h2>
      <div class="flex gap-4 text-sm">
        <template x-for="ceremony in ceremonies" :key="ceremony.name">
          <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg" :class="ceremony.active ? 'bg-blue-600/20 text-blue-300' : 'bg-gray-800/50 text-gray-500'">
            <span class="w-2 h-2 rounded-full" :class="ceremony.active ? 'bg-blue-400 animate-pulse' : 'bg-gray-600'"></span>
            <span x-text="ceremony.name"></span>
            <span class="text-xs opacity-60" x-text="ceremony.time"></span>
          </div>
        </template>
      </div>
    </div>

    <!-- Agent Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-6">
      <template x-for="agent in agents" :key="agent.name">
        <div class="card p-4">
          <div class="flex items-start justify-between mb-3">
            <div>
              <h3 class="text-sm font-semibold text-white" x-text="agent.name"></h3>
              <p class="text-xs text-gray-500 mt-0.5" x-text="agent.role"></p>
            </div>
            <span class="agent-tag text-white" :class="agent.category_color" x-text="agent.category"></span>
          </div>

          <!-- Status -->
          <div class="flex items-center gap-2 mb-3">
            <span class="w-2 h-2 rounded-full" :class="agent.status_color"></span>
            <span class="text-xs" :class="agent.status_color.replace('bg-', 'text-')" x-text="agent.status"></span>
          </div>

          <!-- Task Progress -->
          <div class="mb-2">
            <div class="flex justify-between text-xs text-gray-400 mb-1">
              <span>Sprint Progress</span>
              <span x-text="agent.progress + '%'"></span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" :class="agent.progress_color" :style="'width: ' + agent.progress + '%'"></div>
            </div>
          </div>

          <!-- Current Task -->
          <p class="text-xs text-gray-500 truncate">
            <span class="text-gray-400">→</span>
            <span x-text="agent.current_task"></span>
          </p>
        </div>
      </template>
    </div>

    <!-- Quick Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <template x-for="stat in stats" :key="stat.label">
        <div class="card p-3 text-center">
          <p class="text-2xl font-bold text-white" x-text="stat.value"></p>
          <p class="text-xs text-gray-500 mt-1" x-text="stat.label"></p>
        </div>
      </template>
    </div>
  </div>
